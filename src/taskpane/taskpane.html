<!-- This file shows how to design a first-run page that provides a welcome screen to the user about the features of the add-in. -->

<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contoso Task Pane Add-in</title>

    <!-- Office JavaScript API -->
    <script
      type="text/javascript"
      src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"
    ></script>

    <!-- For more information on Fluent UI, visit https://developer.microsoft.com/fluentui#/. -->
    <link
      rel="stylesheet"
      href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"
    />

    <!-- Template styles -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
  </head>

  <body class="ms-font-m ms-Fabric">
    <div id="app-container">
      <!-- Tab Navigation -->
      <nav class="tab-bar">
        <button class="tab-btn active" data-tab="tab-translate">Dịch thuật</button>
        <button class="tab-btn" data-tab="tab-code">Phân tích Code</button>
        <button class="tab-btn" data-tab="tab-diagram">Sơ đồ</button>
        <button class="tab-btn" data-tab="tab-image">Hình ảnh</button>
      </nav>

      <!-- Tab Content -->
      <main id="app-body" class="content-container">
        <!-- Loading/Sideloading Message -->
        <section id="sideload-msg" class="info-message">
          <p>Vui lòng nạp Add-in (sideload) để bắt đầu.</p>
        </section>

        <!-- Tab 1: Dịch thuật & Chính tả -->
        <section id="tab-translate" class="tab-content active">
          <div class="control-group">
            <label for="translate-text">Nội dung văn bản:</label>
            <textarea
              id="translate-text"
              placeholder="Nhập văn bản hoặc bôi đen văn bản trong Word..."
            ></textarea>
          </div>
          <div class="button-group">
            <button id="btn-translate-pro" class="ms-Button ms-Button--primary">
              <span class="ms-Button-label">Dịch thuật chuyên ngành</span>
            </button>
            <button id="btn-fix-grammar" class="ms-Button">
              <span class="ms-Button-label">Sửa lỗi chính tả</span>
            </button>
          </div>
        </section>

        <!-- Tab 2: Phân tích Code -->
        <section id="tab-code" class="tab-content">
          <div class="control-group">
            <label for="code-text">Mã nguồn:</label>
            <textarea
              id="code-text"
              class="code-font"
              placeholder="Bôi đen đoạn code để phân tích..."
            ></textarea>
          </div>
          <div class="button-group">
            <button id="btn-explain-code" class="ms-Button ms-Button--primary">
              <span class="ms-Button-label">Giải thích Code</span>
            </button>
            <button id="btn-analyze-bugs" class="ms-Button">
              <span class="ms-Button-label">Phân tích & Tìm lỗi</span>
            </button>
          </div>
        </section>

        <!-- Tab 3: Vẽ Sơ đồ -->
        <section id="tab-diagram" class="tab-content">
          <div class="control-group">
            <label for="diagram-prompt">Mô tả sơ đồ (Mermaid):</label>
            <input
              type="text"
              id="diagram-prompt"
              placeholder="Ví dụ: Flowchart quy trình đặt hàng..."
            />
          </div>
          <div class="button-group">
            <button id="btn-generate-diagram" class="ms-Button ms-Button--primary">
              <span class="ms-Button-label">Tạo & Chèn Sơ đồ</span>
            </button>
          </div>
          <div id="diagram-preview" class="preview-area">
            <!-- Mermaid diagram will be rendered here -->
          </div>
        </section>

        <!-- Tab 4: Hình ảnh -->
        <section id="tab-image" class="tab-content">
          <div class="control-group">
            <label for="image-prompt">Từ khóa / Mô tả ảnh:</label>
            <input type="text" id="image-prompt" placeholder="Nhập từ khóa hoặc mô tả ảnh AI..." />
          </div>
          <div class="button-group">
            <button id="btn-search-image" class="ms-Button ms-Button--primary">
              <span class="ms-Button-label">Tìm ảnh Online</span>
            </button>
            <button id="btn-ai-image" class="ms-Button">
              <span class="ms-Button-label">AI Generate Ảnh</span>
            </button>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
